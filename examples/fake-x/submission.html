<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fake X Example</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      font-family: sans-serif;
      color: white;
    }

    #ad-banner {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
    }

    #fake-x {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: sans-serif;
    }

    #fake-x:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    #real-skip {
      position: absolute;
      bottom: 6px;
      left: 6px;
      font-size: 8px;
      color: rgba(255, 255, 255, 0.15);
      cursor: pointer;
      background: none;
      border: none;
      font-family: sans-serif;
      padding: 2px;
    }

    #real-skip:hover {
      color: rgba(255, 255, 255, 0.4);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="overlay" class="hidden">
    <div id="ad-banner">Your video will resume after this ad</div>
    <button id="fake-x">&times;</button>
    <button id="real-skip">Skip Ad</button>
  </div>

  <script>
    (function(window, document) {
      function adSuccess() {
        window.top.postMessage({ type: 'success' }, '*');
      }

      // Show overlay only after ad starts
      window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'adStarted') {
          document.getElementById('overlay').classList.remove('hidden');
        }
      });

      // Fake X — restarts the ad
      document.getElementById('fake-x').addEventListener('click', () => {
        window.top.postMessage({ type: 'fail' }, '*');
      });

      // Real skip
      document.getElementById('real-skip').addEventListener('click', () => {
        adSuccess();
      });
    })(window, document);
  </script>
</body>
</html>
