<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Joel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="stylesheets/custom.css">
  <style type="text/css">
    html,
    body {
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    #overlay-container {
      position: relative;
      width: 960px;
      height: 540px;
    }

    /* Your style here... (feel free to remove this example styling) */
    #skip {
      display: none; /* Hidden until ad starts */
      position: absolute;
      bottom: 60px;
      right: 0;
      padding: 10px 18px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid black;
      border-right-width: 0;
      font-size: 1.2rem;
      border-radius: 4px 0 0 4px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="overlay-container">
    
    <div id="ui-container">
      <div id=dialog-container>
        <div id="dialog-box" class="animateScale"></div>
      </div> 

      <img src="images/shades.png" id="shades">
      <img src="images/encounter-backround.png" class="encounter-backround">
      

      <div class="menu-box hp-menu-box" id="player-hp-menu">
        <div class="menu-button-container sub-menu-button-container" id="player-hp-button-container">
            <p1 class="ui-text" id="player-hp">Player: 50 HP</p1>
          </div>
        </div>

      
      <div class="menu-box sub-menu-box" id="fight-menu">
        <div class="menu-button-container sub-menu-button-container" style="margin-top: 42px" id="fight-button-container">
            <button class="action-button">SWORD</button>
            <button class="action-button">PARRY</button>
            <button class="action-button">SPLASH</button>
            <button class="action-button" onclick="//player_run()">MACROWAVE</button>
          </div>
        </div>


        <div class="menu-box sub-menu-box" id="magic-menu">
        <div class="menu-button-container sub-menu-button-container" style="margin-top: 42px" id="magic-button-container">
            <button class="action-button">HEAL</button>
            <button class="action-button">ADBLOCK</button>
            <button class="action-button">UPDOG</button>
            <button class="action-button" onclick="//player_run()">BANISH</button>
          </div>
        </div>


        <div class="menu-box sub-menu-box" id="act-menu">
        <div class="menu-button-container sub-menu-button-container" style="margin-top: 42px" id="act-button-container">
            <button class="action-button" onclick="playerActHug()">HUG</button>
            <button class="action-button">AURA FARM</button>
            <button class="action-button">GOSSIP</button>
            <button class="action-button">DANCE</button>
          </div>
        </div>


      <div class="menu-box" id="main-menu">
        <div class="menu-button-container" id="main-menu-button-container">
          <button class="action-button" style="margin-left: 200px" onclick="openSubMenu('fight-menu', 'fight-button-container')">FIGHT</button>
          <button class="action-button" onclick="openSubMenu('magic-menu', 'magic-button-container')">MAGIC</button>
          <button class="action-button" onclick="openSubMenu('act-menu', 'act-button-container')">ACT</button>
          <button class="action-button" onclick="playerRun()">RUN</button>
        </div>
      </div>







    </div>
    

    
    <!-- We've added a sample button. Feel free to remove it: -->
    <button id="skip">
      Skip Ad...
    </button>
  </div>

 
  <script src="libraries/howler/howler.min.js"></script>
  <script src="libraries/anime/anime.umd.min.js"></script>
  <script src="libraries/RPGDialogBox/typewriter.js"></script>
  <script src="libraries/RPGDialogBox/app.js"></script>

  <script src="scripts/intro.js"></script>
  <script src="scripts/gameboot.js"></script>
  <script src="scripts/gameplay.js"></script>
  <script src="scripts/attacks.js"></script>
  <script src="scripts/acts.js"></script>
  <script src="scripts/animations.js"></script>
  <script type="text/javascript">
    

    (function(window, document){
      

      const { animate } = anime;

      // This is how you tell the parent window that the ad was successfully skipped.
      function adSuccess() {
        window.top.postMessage({ type: 'success' }, '*');
      }

      const skipButton = document.getElementById('skip');

      // Listen for messages from the game shell
      window.addEventListener('message', (event) => {
        if (!event.data || !event.data.type) return;

        if (event.data.type === 'adStarted') {
          // Show the skip button when the ad starts
          skipButton.style.display = 'block';
        }

        // By default, if the user doesn't "skip" the ad before the video ends,
        // we call fail to restart. You're welcome to replace this with a survey
        // or other interaction instead (see examples/survey).
        if (event.data.type === 'adFinished') {
          skipButton.style.display = 'none';
          window.top.postMessage({ type: 'fail' }, '*');
        }
      });

      // Your ad overlay code goes here, we've added a simple example below: 

      skipButton.addEventListener('click', () => {
        window.top.postMessage({ type: 'pause' }, '*')

        checkIfFirstRun()
        .then(bounceButton)
        .then(() => timeout(500))
        .then(encounterTransition)
        .then(() => timeout(1000))
        .then(startGame)
        .then(() => timeout(3000))
        .then(playerIdle)
        //.catch(handleClickAfterFisrtRun) 



        //skipButton.style.display = 'none';
        //adSuccess();
      });

    })(window, document);
  </script>
</body>
</html>
