<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Joel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="stylesheets/custom.css">
  <style type="text/css">
    html,
    body {
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    #overlay-container {
      position: relative;
      width: 960px;
      height: 540px;
    }

    /* Your style here... (feel free to remove this example styling) */
    #skip {
      display: none; /* Hidden until ad starts */
      position: absolute;
      bottom: 60px;
      right: 0;
      padding: 10px 18px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid black;
      border-right-width: 0;
      font-size: 1.2rem;
      border-radius: 4px 0 0 4px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="overlay-container">
    
    <div id="ui-container">
      <div id=dialog-container>
        <div id="dialog-box" class="animateScale"></div>
      </div> 
      <img src="images/encounter-backround.png" class="encounter-backround">
      
      <div id="attackBox"
        style="background-color: dodgerblue; height: 120px; position:absolute; bottom: 0; left: 0; right: 0; border-style: solid; border-image: url('./images/border.gif'); border-image-repeat: repeat; border-image-slice: 10; border-image-width: 16px; display:none;">

        <div id="attackDialogueBox"
          style="position:absolute; top: 0; bottom: 0; left:0; right: 0; background-color:rgb(202, 201, 201); padding: 12px; display: none; cursor: pointer">
        </div>

        <div id="attacksBox" style="display:inline-block; margin-top: 43px; width: 100%;">
          <button style="margin-left: 200px; margin-right: 2em; color: white; background:none; border:none; cursor: pointer; font-family: 'Trebuchet MS', sans-serif; font-size: 30px; text-shadow: 2px 2px 1px black">FIGHT</button>
          <button style="margin-right: 2em; color: white; background:none; border:none; cursor: pointer; font-family: 'Trebuchet MS', sans-serif; font-size: 30px; text-shadow: 2px 2px 1px black">ITEM</button>
          <button style="margin-right: 2em; color: white; background:none; border:none; cursor: pointer; font-family: 'Trebuchet MS', sans-serif; font-size: 30px; text-shadow: 2px 2px 1px black">MAGIC</button>
          <button onclick="player_run()" style="margin-right: 2em; color: white; background:none; border:none; cursor: pointer; font-family: 'Trebuchet MS', sans-serif; font-size: 30px; text-shadow: 2px 2px 1px black">RUN</button>
        </div>

      </div>


    </div>
    

    
    <!-- We've added a sample button. Feel free to remove it: -->
    <button id="skip">
      Skip Ad...
    </button>
  </div>

 
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>
  <script src="libraries/RPGDialogBox/typewriter.js"></script>
  <script src="libraries/RPGDialogBox/app.js"></script>

  <script src="scripts/intro.js"></script>
  <script src="scripts/gameboot.js"></script>
  <script src="scripts/gameplay.js"></script>
  <script src="scripts/attacks.js"></script>
  <script src="scripts/animations.js"></script>
  <script type="text/javascript">
    

    (function(window, document){
      

      const { animate } = anime;

      // This is how you tell the parent window that the ad was successfully skipped.
      function adSuccess() {
        window.top.postMessage({ type: 'success' }, '*');
      }

      const skipButton = document.getElementById('skip');

      // Listen for messages from the game shell
      window.addEventListener('message', (event) => {
        if (!event.data || !event.data.type) return;

        if (event.data.type === 'adStarted') {
          // Show the skip button when the ad starts
          skipButton.style.display = 'block';
        }

        // By default, if the user doesn't "skip" the ad before the video ends,
        // we call fail to restart. You're welcome to replace this with a survey
        // or other interaction instead (see examples/survey).
        if (event.data.type === 'adFinished') {
          skipButton.style.display = 'none';
          window.top.postMessage({ type: 'fail' }, '*');
        }
      });

      // Your ad overlay code goes here, we've added a simple example below: 

      skipButton.addEventListener('click', () => {
        window.top.postMessage({ type: 'pause' }, '*')

        checkIfFirstRun()
        .then(bounceButton)
        .then(() => timeout(500))
        .then(encounterTransition)
        .then(() => timeout(1000))
        .then(startGame)
        .then(() => timeout(3000))
        .then(gameLoopEntry)
        //.catch(handleClickAfterFisrtRun) 



        //skipButton.style.display = 'none';
        //adSuccess();
      });

    })(window, document);
  </script>
</body>
</html>
